<!DOCTYPE html>
<html>
<head><title>Debug Terminal</title></head>
<body>
<script>
const sessionId = new URLSearchParams(window.location.search).get('session') || 'debug123';
const ws = new WebSocket(`ws://localhost:8788/terminal/${sessionId}/ws`);
ws.binaryType = 'arraybuffer';

ws.onopen = () => {
  console.log('[DEBUG] WebSocket opened');
  
  // Send terminal size
  const sizeMsg = JSON.stringify({ columns: 80, rows: 24 });
  console.log('[DEBUG] Sending terminal size:', sizeMsg);
  ws.send(sizeMsg);
  
  setTimeout(() => {
    // Try sending "ls"
    const textEncoder = new TextEncoder();
    const CMD_OUTPUT = '0';
    const input = 'ls\n';
    const payload = new Uint8Array(input.length + 1);
    payload[0] = CMD_OUTPUT.charCodeAt(0);
    for (let i = 0; i < input.length; i++) {
      payload[i + 1] = input.charCodeAt(i);
    }
    console.log('[DEBUG] Sending input:', input);
    ws.send(payload);
  }, 500);
};

ws.onmessage = (e) => {
  console.log('[DEBUG] Received:', {
    type: typeof e.data,
    length: e.data.byteLength,
    content: e.data instanceof ArrayBuffer && e.data.byteLength > 0 ?
      Array.from(new Uint8Array(e.data.slice(0,1))).map(x => String.fromCharCode(x)).join('') :
      'empty'
  });
};

ws.onerror = (error) => {
  console.error('[DEBUG] Error:', error);
};

ws.onclose = (code, reason) => {
  console.log('[DEBUG] Closed:', code, reason);
};
</script>
</body>
</html>
