name = "filepath-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[durable_objects]
bindings = [
  { name = "CONTAINER_MANAGER", class_name = "ContainerManager" }
]

[[migrations]]
tag = "v1"
new_classes = ["ContainerManager"]

